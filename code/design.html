

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Disaster Manager</title>
  <style>
    /* Page reset and base */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: "Segoe UI", Roboto, Arial, sans-serif; background: #f5f7fb; color: #0b2545; }

    /* Header area top-left */
    .site-header {
      position: fixed;
      top: 20px;
      left: 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }

    .site-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #07203a;
    }

    .site-desc {
      font-size: 14px;
      font-weight: 500;
      color: #3b556f;
      max-width: 320px;
      line-height: 1.2;
    }

    /* Main centered content */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .card {
      background: linear-gradient(180deg, #ffffffcc, #f0f6ffcc);
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(11, 37, 69, 0.08);
      padding: 36px;
      width: 100%;
      max-width: 720px;
      text-align: center;
    }

    .card h1 {
      margin-bottom: 8px;
      font-size: 22px;
      color: #07203a;
    }

    .card p {
      margin-bottom: 22px;
      color: #3b556f;
      font-size: 15px;
    }

    /* Buttons row */
    .btn-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      appearance: none;
      border: none;
      cursor: pointer;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      transition: transform 120ms ease, box-shadow 120ms ease;
      min-width: 200px;
    }

    .btn-primary {
      background: linear-gradient(90deg,#ff6b6b,#ff8a5c);
      color: #fff;
      box-shadow: 0 6px 18px rgba(255,107,107,0.18);
    }

    .btn-secondary {
      background: #ffffff;
      color: #07203a;
      border: 1px solid #d6e3f5;
      box-shadow: 0 6px 18px rgba(7,32,58,0.06);
    }

    .btn:hover { transform: translateY(-3px); }
    .btn:active { transform: translateY(-1px); }

    /* Responsive adjustments */
    @media (max-width: 520px) {
      .site-title { font-size: 22px; }
      .site-desc { font-size: 13px; max-width: 220px; }
      .btn { min-width: 160px; padding: 10px 14px; font-size: 14px; }
      .card { padding: 24px; }
    }
  </style>
</head>
<body>
  <header class="site-header" role="banner">
    <div class="site-title">Disaster Manager</div>
    <div class="site-desc">Coordinating relief, volunteers, and resources quickly and safely</div>
  </header>

  <main class="hero" role="main">
    <section class="card" aria-labelledby="welcome-title">
      <h1 id="welcome-title">Welcome to Disaster Manager</h1>
      <p>Use the options below to request immediate help or to manage volunteer activities.</p>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="location.href='#request'">Request Help Form</button>
        <button class="btn btn-secondary" onclick="location.href='#volunteer'">Volunteer Dashboard</button>
      </div>
    </section>
  </main>
</body>
</html>
